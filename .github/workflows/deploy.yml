name: Deploy Flask App to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/flask-s3-upload || exit 1

            
            git pull origin master

          
            /home/ubuntu/flask-s3-upload/venv/bin/pip install -r requirements.txt

            
            pm2 reload flask-app || pm2 start app.py \
              --name flask-app \
              --interpreter /home/ubuntu/flask-s3-upload/venv/bin/python
